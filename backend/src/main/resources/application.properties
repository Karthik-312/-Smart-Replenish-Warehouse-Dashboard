spring.application.name=stockpulse

server.port=${PORT:8080}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:stockpulse;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google OAuth
stockpulse.google.client-id=${GOOGLE_CLIENT_ID:445174404778-ust5vn01l8a56vbrn4hejkb76tjep32d.apps.googleusercontent.com}
