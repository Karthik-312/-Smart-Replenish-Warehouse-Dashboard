spring.application.name=stockpulse

server.port=${PORT:8080}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://smart-replenish-warehouse-dashboard.vercel.app}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:stockpulse;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google OAuth
stockpulse.google.client-id=${GOOGLE_CLIENT_ID:445174404778-ust5vn01l8a56vbrn4hejkb76tjep32d.apps.googleusercontent.com}
stockpulse.admin.emails=daggupatikarthikeya@gmail.com,karthikeyadaggupati11@gmail.com

# Email notifications (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
stockpulse.alert.recipient=${ALERT_EMAIL:}
stockpulse.mail.enabled=${MAIL_ENABLED:false}
